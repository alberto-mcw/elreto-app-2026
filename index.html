  <script>
    (function () {
      var pw = 0;
      function capture() {
        if (window.innerWidth < window.innerHeight || pw === 0) pw = window.innerWidth;
      }
      function lock() {
        if (!pw) return;
        var s = document.documentElement.style;
        s.width = pw + 'px'; s.maxWidth = pw + 'px'; s.overflowX = 'hidden';
      }
      function unlock() {
        var s = document.documentElement.style;
        s.width = s.maxWidth = s.overflowX = '';
        capture();
      }
      capture();
      // orientationchange fires BEFORE viewport updates on iOS — lock width preemptively
      window.addEventListener('orientationchange', function () {
        var a = window.orientation;
        (a === 90 || a === -90) ? lock() : unlock();
      });
      // resize fallback for Android/desktop
      window.addEventListener('resize', function () {
        window.innerWidth > window.innerHeight ? lock() : unlock();
      });
    }());
  </script>
